name: Tests API

on:
  push:
    branches: [main, 'feat/**']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run API tests
        run: npm test
        env:
          JWT_SECRET: ci-test-secret-key
          NODE_ENV: test

      - name: Check static build
        run: npm run build:static

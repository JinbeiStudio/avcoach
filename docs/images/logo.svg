<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">
  <defs>
    <linearGradient id="fl" x1="100" y1="16" x2="100" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFD84D"/>
      <stop offset="45%"  stop-color="#E87520"/>
      <stop offset="100%" stop-color="#C05F10"/>
    </linearGradient>
    <linearGradient id="flInner" x1="100" y1="22" x2="100" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFF0A0"/>
      <stop offset="100%" stop-color="#FFD84D" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- ── Outer circle ── -->
  <circle cx="100" cy="102" r="68" stroke="white" stroke-width="2.8" fill="none"/>

  <!-- ── Cardinal spikes (N / S / E / W) — filled diamonds ── -->
  <!-- North -->
  <path d="M100,34 L104.5,90 L100,84 L95.5,90 Z" fill="white"/>
  <!-- South -->
  <path d="M100,170 L104.5,114 L100,120 L95.5,114 Z" fill="white"/>
  <!-- East -->
  <path d="M166,102 L110,106.5 L116,102 L110,97.5 Z" fill="white"/>
  <!-- West -->
  <path d="M34,102 L90,106.5 L84,102 L90,97.5 Z" fill="white"/>

  <!-- ── Diagonal hooks (NE / NW / SE / SW) ── -->
  <!-- NE -->
  <path d="M143,61 L153,51 Q157,44 152,40 Q148,46 141,53 Z" fill="white"/>
  <!-- NW -->
  <path d="M57,61 L47,51 Q43,44 48,40 Q52,46 59,53 Z" fill="white"/>
  <!-- SE -->
  <path d="M143,143 L153,153 Q157,160 152,164 Q148,158 141,151 Z" fill="white"/>
  <!-- SW -->
  <path d="M57,143 L47,153 Q43,160 48,164 Q52,158 59,151 Z" fill="white"/>

  <!-- ── Torch — flame ── -->
  <path d="M100,62 C97,53 89,44 92,32 C94,23 97,17 100,10
           C103,17 106,23 108,32 C111,44 103,53 100,62 Z"
        fill="url(#fl)"/>
  <!-- Inner flame highlight -->
  <path d="M100,57 C98,51 94,44 96,35 C97,29 99,24 100,20
           C101,24 103,29 104,35 C106,44 102,51 100,57 Z"
        fill="url(#flInner)"/>

  <!-- ── Torch — cup/bowl under flame ── -->
  <path d="M86,62 Q100,57 114,62 L111,73 Q100,70 89,73 Z" fill="white"/>

  <!-- ── Torch — column body ── -->
  <rect x="91" y="73" width="18" height="50" rx="2.5" fill="white"/>

  <!-- Column horizontal lines (decorative grooves) -->
  <line x1="95" y1="81"  x2="105" y2="81"  stroke="#0B1829" stroke-width="1.2"/>
  <line x1="95" y1="90"  x2="105" y2="90"  stroke="#0B1829" stroke-width="1.2"/>
  <line x1="95" y1="99"  x2="105" y2="99"  stroke="#0B1829" stroke-width="1.2"/>
  <line x1="95" y1="108" x2="105" y2="108" stroke="#0B1829" stroke-width="1.2"/>
  <line x1="95" y1="117" x2="105" y2="117" stroke="#0B1829" stroke-width="1.2"/>

  <!-- ── Snake / S-curve winding around the column ── -->
  <path d="M100,120 C94,113 107,106 100,99 C93,92 107,85 100,78"
        stroke="#0B1829" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- ── Torch — base / pedestal ── -->
  <rect x="88"  y="123" width="24" height="5"  rx="2.5" fill="white"/>
  <rect x="92"  y="128" width="16" height="4"  rx="2"   fill="white"/>
  <rect x="86"  y="132" width="28" height="4"  rx="2.5" fill="white"/>

  <!-- ── "AV Coach" text ── -->
  <text x="100" y="163"
        text-anchor="middle"
        font-family="Georgia,'Palatino Linotype',serif"
        font-size="15"
        font-style="italic"
        fill="#E87520"
        letter-spacing="0.8">AV Coach</text>
</svg>
